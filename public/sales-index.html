<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可樂旅遊 - AI 小票根 (Sales版)</title>
    <meta name="robots" content="noindex, nofollow">
    
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self'; 
        script-src 'self' https://unpkg.com https://cdnjs.cloudflare.com; 
        style-src 'self' https://fonts.googleapis.com; 
        font-src https://fonts.gstatic.com; 
        connect-src 'self' https://pmo-ai-ticket.sd-574.workers.dev;
    ">
    
    <link rel="stylesheet" href="tailwind-built.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <div id="empAuthOverlay" class="fixed inset-0 z-[100] hidden flex-col items-center justify-center bg-slate-900/80 backdrop-blur-sm px-4 transition-opacity duration-300">
        <div class="bg-white rounded-[2rem] p-8 max-w-sm w-full shadow-2xl animate-pop-in relative overflow-hidden border border-white">
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-indigo-100 blur-3xl rounded-full opacity-60 pointer-events-none"></div>
            <div class="relative z-10">
                <div class="flex items-center justify-center gap-4 w-full">
                    <div class="bg-indigo-600 p-3 rounded-2xl shadow-xl shadow-indigo-100 shrink-0">
                        <i data-lucide="ticket" class="text-white w-7 h-7"></i>
                    </div>
                    <div class="flex flex-col justify-center">
                        <div class="flex items-center">
                            <h1 class="text-2xl font-black text-slate-800 tracking-tight">AI 小票根</h1>
                            <span class="text-[10px] font-bold text-teal-600 border border-teal-200 bg-teal-50 px-2 py-0.5 rounded-full ml-2 uppercase">Sales版V1.0</span>
                            <span class="text-[10px] font-bold text-blue-600 border border-blue-200 bg-blue-50 px-2 py-0.5 rounded-full ml-2 uppercase">BETA版</span>
                        </div>
                        <p class="text-slate-500 text-sm font-medium tracking-tight">票根多模態解析AI AGENT</p>
                    </div>
                </div>
                <br>
                <h3 class="text-lg font-black text-slate-500 mb-2 tracking-tight text-center">請輸入員工編號</h3>
                <div class="mb-6 mt-6">
                    <div class="relative">
                        <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                        <input type="text" id="empIdInput" placeholder="例如: 1234" class="w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-4 focus:ring-indigo-100 focus:border-indigo-400 transition-all font-bold text-slate-800 tracking-wider uppercase text-sm" maxlength="4" autocomplete="off" inputmode="numeric">
                    </div>
                    <p id="empIdError" class="text-rose-500 text-[10px] font-bold mt-2 hidden flex items-center gap-1">
                        <i data-lucide="alert-circle" class="w-3 h-3"></i> 請輸入 4 碼數字員工編號
                    </p>
                </div>
                <button id="verifyEmpIdBtn" class="w-full bg-slate-900 hover:bg-indigo-600 text-white font-black py-3.5 rounded-xl transition-all shadow-md active:scale-95 flex items-center justify-center gap-2">
                    <span>GO</span>
                </button>
            </div>
        </div>
    </div>

    <div id="mainAppContent" class="max-w-[1400px] mx-auto py-10 px-6 transition-all duration-300 opacity-30 pointer-events-none">
        <div class="flex items-center justify-between mb-10 max-w-3xl mx-auto">
            <div class="flex items-center gap-4">
                <div class="bg-indigo-600 p-3 rounded-2xl shadow-xl shadow-indigo-100">
                    <i data-lucide="ticket" class="text-white w-7 h-7"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-black text-slate-800 tracking-tight text-nowrap">AI 小票根 <span class="text-[10px] font-bold text-teal-600 border border-teal-200 bg-teal-50 px-2 py-0.5 rounded-full ml-2 uppercase text-nowrap">Sales版V1.0</span></h1>
                    <p class="text-slate-500 text-sm font-medium tracking-tight">票根多模態解析AI AGENT</p>
                </div>
            </div>
        </div>

        <div class="max-w-3xl mx-auto mb-10">
            <div id="salesCard" class="bg-white rounded-[2.5rem] shadow-xl shadow-slate-200/60 p-8 border border-white flex flex-col relative overflow-hidden">
                <div class="absolute -top-10 -right-10 w-40 h-40 bg-teal-100 blur-3xl rounded-full opacity-50 pointer-events-none"></div>

                <div class="flex items-center justify-between mb-6 relative z-10">
                    <div class="flex items-center gap-3">
                        <div class="bg-teal-50 p-2 rounded-xl text-teal-600"><i data-lucide="search-check" class="w-5 h-5"></i></div>
                        <h2 class="text-lg font-black text-slate-800">查詢下載</h2>
                    </div>
                </div>

                <div class="space-y-6 flex-grow relative z-10">
                    <div>
                        <label class="block text-xs font-black text-slate-500 mb-2 uppercase tracking-wider">查詢團號 (必填)</label>
                        <input type="text" id="salesTourCode" placeholder="EEC011109CI6" class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:outline-none focus:ring-4 focus:ring-teal-100 transition-all font-bold text-slate-800 tracking-widest text-lg uppercase text-nowrap">
                    </div>
                    <div>
                        <label class="block text-xs font-black text-slate-500 mb-2 uppercase tracking-wider">旅客英文姓名 (必填，可多筆)</label>
                        <textarea id="salesPassengerName" rows="3" placeholder="PAN/WUNWUN,PAN/JIANJIAN" class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:outline-none focus:ring-4 focus:ring-teal-100 transition-all font-bold text-slate-800 tracking-widest text-lg uppercase resize-none"></textarea>
                        <p class="mt-2 text-[16px] text-teal-600 font-medium italic">* 英文姓與英文名請以「/」區隔，多筆姓名請以「,」區隔，符號皆為半形，範例：PAN/WUNWUN,PAN/JIANJIAN</p>
                    </div>
                </div>

                <div class="mt-8 relative z-10">
                    <button id="startSalesProcess" class="w-full bg-teal-600 hover:bg-teal-700 text-white font-black py-5 rounded-2xl transition-all shadow-lg shadow-teal-200 flex items-center justify-center gap-3 active:scale-95 group">
                        <i data-lucide="sparkles" class="w-5 h-5 text-yellow-400 group-hover:rotate-12 transition-transform"></i>
                        <span>立即查詢</span>
                    </button>
                </div>
            </div>
        </div>

        <div class="flex justify-center w-full">
            <div id="resultsCard" class="hidden w-full max-w-7xl bg-white rounded-[2.5rem] shadow-xl shadow-slate-200/60 overflow-hidden border border-white animate-in mx-auto">
                <div class="p-8 border-b border-slate-100 flex justify-between items-center bg-slate-50/30">
                    <h2 class="font-black text-slate-800 flex items-center gap-2">
                        <i data-lucide="list-checks" class="text-green-500 w-6 h-6"></i>
                        查詢結果明細
                    </h2>
                    <div class="flex items-center gap-3">
                        <button id="batchDownloadBtn" class="hidden group items-center justify-center gap-1.5 px-4 py-1.5 bg-blue-50 hover:bg-blue-600 text-blue-600 hover:text-white rounded-full transition-all text-[11px] font-black shadow-sm border border-blue-100">
                            <i data-lucide="folder-down" class="w-4 h-4 group-hover:-translate-y-0.5 transition-transform pointer-events-none"></i>
                            下載全部PDF
                        </button>
                        <span id="statusBadge" class="px-4 py-1.5 bg-teal-100 text-teal-700 rounded-full text-[10px] font-black uppercase tracking-widest text-nowrap">檢索成功</span>
                    </div>
                </div>
                
                <div class="overflow-x-auto no-scrollbar">
                    <table class="w-full text-left table-fixed min-w-[1000px]">
                        <thead class="bg-white text-slate-400 text-[11px] uppercase font-black border-b border-slate-100">
                            <tr>
                                <th class="px-10 py-6 w-32">團號</th>
                                <th class="px-10 py-6">旅客姓名 (Name)</th>
                                <th class="px-10 py-6 text-center">票號 (Ticket No.)</th>
                                <th class="px-10 py-6 text-center">訂位代碼 (PNR)</th>
                                <th class="px-10 py-6">航空公司</th>
                                <th class="px-8 py-6 text-center w-40 whitespace-nowrap">下載機票</th>
                            </tr>
                        </thead>
                        <tbody id="resultTableBody"></tbody>
                    </table>
                </div>
                
                <div class="p-8 bg-slate-50/30 flex justify-end items-center border-t border-slate-100">
                    <button id="clearBtn" class="px-8 py-3 bg-white border border-slate-200 rounded-2xl text-slate-700 hover:bg-slate-50 font-black transition-all text-sm shadow-sm uppercase tracking-wider flex items-center gap-2">
                        <i data-lucide="rotate-ccw" class="w-4 h-4"></i> 重新查詢
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="statusOverlay" class="hidden fixed inset-0 z-50 items-center justify-center bg-slate-900/60 status-overlay px-4">
        <div class="bg-white rounded-[2.5rem] p-10 max-w-sm w-full shadow-2xl text-center">
            <div id="statusIconContainer" class="w-20 h-20 rounded-full mx-auto mb-6 flex items-center justify-center bg-teal-50 text-teal-600">
                <i id="statusIconElement" data-lucide="loader-2" class="w-10 h-10 animate-spin"></i>
            </div>
            <h2 id="statusTitle" class="text-2xl font-black text-slate-800 mb-2">處理中</h2>
            <p id="statusDesc" class="text-slate-500 text-sm font-medium mb-8 leading-relaxed whitespace-pre-line"></p>
            <button id="statusBtn" class="hidden w-full py-4 bg-slate-100 hover:bg-slate-200 text-slate-600 font-black rounded-2xl transition-all">關閉視窗</button>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-3 rounded-full text-xs font-black shadow-2xl opacity-0 transition-all pointer-events-none z-50 uppercase tracking-widest">已複製到剪貼簿</div>

    <template id="skeletonRowTemplate">
        <tr class="shimmer-row">
            <td class="px-10 py-7"><div class="h-4 w-16 loading-shimmer rounded-lg"></div></td>
            <td class="px-10 py-7"><div class="h-4 w-40 loading-shimmer rounded-lg"></div></td>
            <td class="px-10 py-7 text-center"><div class="h-4 w-32 loading-shimmer rounded-lg mx-auto"></div></td>
            <td class="px-10 py-7 text-center"><div class="h-4 w-20 loading-shimmer rounded-lg mx-auto"></div></td>
            <td class="px-10 py-7"><div class="h-4 w-20 loading-shimmer rounded-lg"></div></td>
            <td class="px-8 py-7 text-center"><div class="h-4 w-24 loading-shimmer rounded-lg mx-auto"></div></td>
        </tr>
    </template>

    <template id="resultRowTemplate">
        <tr class="border-b border-slate-50 hover:bg-slate-50 transition-all duration-300 animate-in">
            <td class="tpl-tour px-10 py-7 text-[10px] font-black text-slate-400 tracking-tighter"></td>
            <td class="tpl-name px-10 py-7 font-black text-slate-800 text-sm uppercase"></td>
            <td class="px-10 py-7 text-center font-mono text-teal-600 font-bold text-sm tracking-tighter">
                <div class="copy-target cursor-pointer flex items-center justify-center gap-1 group/item">
                    <span class="tpl-ticket"></span> <i data-lucide="copy" class="w-3 h-3 copy-hint text-slate-300 group-hover/item:text-teal-400 pointer-events-none"></i>
                </div>
            </td>
            <td class="px-10 py-7 text-center font-mono text-indigo-700 font-black text-sm tracking-widest bg-indigo-50/30 rounded-2xl uppercase">
                <div class="copy-target cursor-pointer flex items-center justify-center gap-1 group/item">
                    <span class="tpl-pnr"></span> <i data-lucide="copy" class="w-3 h-3 copy-hint text-slate-300 group-hover/item:text-indigo-400 pointer-events-none"></i>
                </div>
            </td>
            <td class="tpl-airline px-10 py-7 text-xs font-bold text-slate-600"></td>
            <td class="tpl-download-container px-8 py-7 text-center"></td>
        </tr>
    </template>

    <script src="sales-app.js"></script>
</body>
</html>
